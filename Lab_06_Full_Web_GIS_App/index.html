<!DOCTYPE html>
<html>
<head>
  <title>Bhutan Health Care Centre</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.css" />


  <style>
    html, body {
      height: 100%;
      margin: 0;
    }

    #map {
      height: calc(100vh - 56px);
      width: 100%;
    }

    .legend-color {
      width: 18px;
      height: 18px;
      display: inline-block;
      margin-right: 8px;
    }

    .coords-control {
      background: rgba(255, 255, 255, 0.9);
      padding: 6px 10px;
      border-radius: 4px;
      font-size: 13px;
      line-height: 1.4;
      box-shadow: 0 0 8px rgba(0,0,0,0.15);
    }
    
  </style>
</head>

<body>

  <nav class="navbar navbar-dark bg-info">
    <div class="container-fluid">
      <div class="d-flex align-items-center">
        <img src="https://www.jnec.edu.bt/wp-content/uploads/2022/06/JNEC-Logo-100x100-1.png"
             alt="JNEC Logo" width="40" height="40" class="me-2">
        <span class="navbar-brand mb-0 h1">Bhutan Health Care Centre</span>
      </div>
    </div>
  </nav>

  <div class="container-fluid">
    <div class="row">

      <div class="col-md-3 col-lg-2 bg-light border-end p-3" style="height: calc(100vh - 56px); overflow-y: auto;">
        <h5>Map Tools</h5>

        <!-- TASK: Paste button or layer information here -->
<button class="btn btn-primary w-100 mb-3" onclick="zoomToBhutan()">
  Zoom to Bhutan
</button>
<button class="btn btn-secondary w-100 mb-3" onclick="toggleLegend()">
  Show Legend
</button>

        <div class="card mb-3">
          <div class="card-header">Measurement Tools</div>
          <div class="card-body">
            <p class="small mb-2">Use the buttons below to measure distance or area.</p>
            <button class="btn btn-outline-primary w-100 mb-2" id="measureDistanceBtn">Measure Distance</button>
            <button class="btn btn-outline-primary w-100 mb-2" id="measureAreaBtn">Measure Area</button>
          </div>
        </div>

        <div class="card mb-3">
          <div class="card-header">Layers</div>
          <div class="card-body">
            <p class="small">Use the Leaflet layer control on the map to turn layers on and off.</p>
          </div>
        </div>

        <div class="card" id="legendCard" style="display:none;">
          <div class="card-header">Legend</div>
          <div class="card-body">
            <p><span class="legend-color bg-warning"></span>Dzongkhag Boundary</p>
            <p><span class="legend-color bg-danger"></span>Hospital Location</p>
          </div>
        </div>
      </div>

      <div class="col-md-9 col-lg-10 p-0">
        <div id="map"></div>
      </div>

    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.js"></script>
  <script src="https://unpkg.com/@turf/turf@6.5.0/turf.min.js"></script>

  <script src="script.js"></script>

</body>
</html>
